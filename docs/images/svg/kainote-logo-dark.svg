<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background version (white "Kai" for dark backgrounds) -->
  
  <!-- Waveform icon background -->
  <rect x="4" y="12" width="56" height="56" rx="12" fill="#6C5CE7" fill-opacity="0.15"/>
  
  <!-- Waveform bars -->
  <rect x="14" y="30" width="5" height="20" rx="2.5" fill="#6C5CE7"/>
  <rect x="22" y="24" width="5" height="32" rx="2.5" fill="#6C5CE7"/>
  <rect x="30" y="16" width="5" height="48" rx="2.5" fill="#6C5CE7"/>
  <rect x="38" y="22" width="5" height="36" rx="2.5" fill="#6C5CE7"/>
  <rect x="46" y="28" width="5" height="24" rx="2.5" fill="#6C5CE7"/>
  
  <!-- "Kai" text - white for dark backgrounds -->
  <text x="72" y="54" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="700" letter-spacing="-1.5" fill="#F5F5F7">Kai</text>
  
  <!-- "Note" text - accent purple -->
  <text x="152" y="54" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="700" letter-spacing="-1.5" fill="#6C5CE7">Note</text>
</svg>
